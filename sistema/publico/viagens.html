  <style>
    .modal-viagem {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(6px);

    .modal-viagem.ativo {
      display: flex;
    }
    
    .modal-viagem-content {
      background: linear-gradient(135deg, #0a0f1f 0%, #141a2f 100%);
      padding: 2.5rem;
      border-radius: 14px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(37, 99, 235, 0.2);
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .notificacao {

      top: 20px;

      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      color: white;
      padding: 16px 24px;
      border-radius: 10px;

      }

const token = localStorage.getItem('token');

}

// ========================================
// WEBSOCKET
// ========================================
let ws = null;

function conectarWebSocket() {
  const protocolo = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(protocolo + '//' + window.location.host);

  ws.onopen = function() {
    console.log('WebSocket conectado');
    carregarViagens();
  };

  ws.onmessage = function(event) {
    const mensagem = JSON.parse(event.data);
    if (mensagem.evento === 'viagem_criada' || mensagem.evento === 'viagem_atualizada') {
      carregarViagens();
      mostrarNotificacao(mensagem.evento === 'viagem_criada' ? '✅ Viagem criada!' : '✅ Viagem atualizada!');
    }
  };

  ws.onerror = function() { console.error('Erro WebSocket'); };
  ws.onclose = function() { setTimeout(conectarWebSocket, 3000); };
}

function mostrarNotificacao(msg) {
  const notif = document.createElement('div');
  notif.className = 'notificacao';
  notif.textContent = msg;
  document.body.appendChild(notif);
  setTimeout(() => notif.remove(), 3000);
}

// ========================================
// CANVAS
// ========================================
function initCanvas() {
  const canvas = document.getElementById('background-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  let particles = [];
  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 3 + 1;
      this.speedX = (Math.random() - 0.5) * 0.8;
      this.speedY = (Math.random() - 0.5) * 0.8;
      this.opacity = Math.random() * 0.7 + 0.3;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.x > canvas.width) this.x = 0;
      if (this.x < 0) this.x = canvas.width;
      if (this.y > canvas.height) this.y = 0;
      if (this.y < 0) this.y = canvas.height;
    }
    draw() {
      ctx.fillStyle = 'rgba(37, 99, 235, ' + this.opacity + ')';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  for (let i = 0; i < 120; i++) particles.push(new Particle());
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
  window.addEventListener('resize', function() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

initCanvas();
conectarWebSocket();

// ========================================
// CRIAR VIAGEM
// ========================================
function abrirModalCriarViagem() {
  document.getElementById('modalCriarViagem').classList.add('ativo');
  carregarSelects();
}

function carregarSelects() {
  Promise.all([
    fetch('/api/caminhoes', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json()),
    fetch('/api/motoristas', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json()),
    fetch('/api/funcionarios', { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json())
  ]).then(function(results) {
    var caminhoes = results[0], motoristas = results[1], funcionarios = results[2];
    
    document.getElementById('caminhaoCriar').innerHTML = '<option value="">Selecione o caminhão</option>';
    caminhoes.forEach(function(c) {
      if (c.status === 'disponivel') {
        document.getElementById('caminhaoCriar').innerHTML += '<option value="' + c.id + '">' + c.placa + ' (' + c.tipo + ')</option>';
      }
    });

    document.getElementById('motoristaCriar').innerHTML = '<option value="">Selecione o motorista</option>';
    motoristas.forEach(function(m) {
      document.getElementById('motoristaCriar').innerHTML += '<option value="' + m.id + '">' + m.nome + '</option>';
    });

    document.getElementById('funcionarioCriar').innerHTML = '<option value="">Selecione o funcionário</option>';
    funcionarios.forEach(function(f) {
      document.getElementById('funcionarioCriar').innerHTML += '<option value="' + f.id + '">' + f.nome + ' (' + f.funcao + ')</option>';
    });
  });
}

function criarViagem() {
  var caminhao_id = document.getElementById('caminhaoCriar').value;
  var motorista_id = document.getElementById('motoristaCriar').value;
  var funcionario_id = document.getElementById('funcionarioCriar').value;
  var rota = document.getElementById('rotaCriar').value;
  var mercadoria = document.getElementById('mercadoriaCriar').value;
  var nota_fiscal = document.getElementById('notaFiscalCriar').value;

  if (!caminhao_id || !motorista_id || !funcionario_id || !rota || !mercadoria || !nota_fiscal) {
    alert('Preencha todos os campos!');
    return;
  }

  fetch('/api/viagens', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({ 
      caminhao_id: parseInt(caminhao_id), 
      motorista_id: parseInt(motorista_id), 
      funcionario_id: parseInt(funcionario_id), 
      rota: rota, 
      mercadoria: mercadoria, 
      nota_fiscal: nota_fiscal 
    })
  })
  .then(r => r.json())
  .then(function(data) {
    if (data.erro) {
      alert(data.erro);
      return;
    }
    fecharModal('modalCriarViagem');
    document.getElementById('caminhaoCriar').value = '';
    document.getElementById('motoristaCriar').value = '';
    document.getElementById('funcionarioCriar').value = '';
    document.getElementById('rotaCriar').value = '';
    document.getElementById('mercadoriaCriar').value = '';
    document.getElementById('notaFiscalCriar').value = '';
    mostrarNotificacao('✅ Viagem criada com sucesso!');
    carregarViagens();
  });
}

// ========================================
// CARREGAR E EXIBIR VIAGENS
// ========================================
function carregarViagens() {
  fetch('/api/viagens', { headers: { 'Authorization': 'Bearer ' + token } })
  .then(r => r.json())
  .then(function(viagens) {
    var tbody = document.getElementById('tabelaViagens');
    tbody.innerHTML = '';

    if (!viagens || viagens.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem; color: rgba(224, 231, 255, 0.5);">Nenhuma viagem registrada</td></tr>';
      return;
    }

    viagens.forEach(function(v) {
      var statusBg = '';
      var statusTxt = v.status.replace(/_/g, ' ').toUpperCase();
      
      if (v.status === 'carregado') statusBg = 'background: rgba(245, 158, 11, 0.2); color: #fbbf24;';
      if (v.status === 'em_rota') statusBg = 'background: rgba(37, 99, 235, 0.2); color: #60a5fa;';
      if (v.status === 'entregue') statusBg = 'background: rgba(16, 185, 129, 0.2); color: #10b981;';
      if (v.status === 'retorno_problema') statusBg = 'background: rgba(239, 68, 68, 0.2); color: #ef4444;';

      var botoes = '';
      if (v.status === 'carregado') {
        botoes = '<button class="btn-acao btn-iniciar" onclick="abrirModalIniciarViagem(' + v.id + ')">🚀 Iniciar</button>';
      } else if (v.status === 'em_rota') {
        botoes = '<button class="btn-acao btn-encerrar" onclick="abrirModalEncerrarViagem(' + v.id + ')">✅ Encerrar</button>';
      }

      tbody.innerHTML += '<tr style="border-top: 1px solid rgba(37, 99, 235, 0.1);"><td style="padding: 1.25rem; color: #e0e7ff;">' + v.id + '</td><td style="padding: 1.25rem; color: #e0e7ff;">' + v.placa + '</td><td style="padding: 1.25rem; color: #e0e7ff;">' + v.motorista + '</td><td style="padding: 1.25rem; color: #e0e7ff;">' + v.rota + '</td><td style="padding: 1.25rem;"><span class="status-badge" style="' + statusBg + '">' + statusTxt + '</span></td><td style="padding: 1.25rem; color: #e0e7ff;">' + (v.data_saida ? v.data_saida.substring(0, 10) : '-') + '</td><td style="padding: 1.25rem;">' + botoes + '</td></tr>';
    });
  });
}

// ========================================
// INICIAR VIAGEM
// ========================================
function abrirModalIniciarViagem(id) {
  document.getElementById('idViagemIniciar').value = id;
  fetch('/api/viagens', { headers: { 'Authorization': 'Bearer ' + token } })
  .then(r => r.json())
  .then(function(viagens) {
    var viagem = viagens.find(v => v.id === id);
    if (viagem) {
      document.getElementById('msgViagemIniciar').textContent = 'Confirmar início da viagem para ' + viagem.rota + ' com ' + viagem.motorista;
    }
  });
  document.getElementById('modalIniciarViagem').classList.add('ativo');
}

function confirmarIniciarViagem() {
  var id = document.getElementById('idViagemIniciar').value;
  fetch('/api/viagens/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({ status: 'em_rota' })
  })
  .then(r => r.json())
  .then(function(data) {
    if (data.erro) {
      alert(data.erro);
      return;
    }
    fecharModal('modalIniciarViagem');
    mostrarNotificacao('🚀 Viagem iniciada! Status: EM ROTA');
    carregarViagens();
  });
}

// ========================================
// ENCERRAR VIAGEM
// ========================================
function abrirModalEncerrarViagem(id) {
  document.getElementById('idViagemEncerrar').value = id;
  document.getElementById('resultadoEntrega').value = '';
  document.getElementById('camposProblema').style.display = 'none';
  fetch('/api/viagens', { headers: { 'Authorization': 'Bearer ' + token } })
  .then(r => r.json())
  .then(function(viagens) {
    var viagem = viagens.find(v => v.id === id);
    if (viagem) {
      document.getElementById('msgViagemEncerrar').textContent = 'Confirmar encerramento da viagem para ' + viagem.rota;
    }
  });
  document.getElementById('modalEncerrarViagem').classList.add('ativo');
}

function mostrarCamposEncerrar() {
  var resultado = document.getElementById('resultadoEntrega').value;
  document.getElementById('camposProblema').style.display = resultado === 'retorno_problema' ? 'block' : 'none';
}

function confirmarEncerrarViagem() {
  var id = document.getElementById('idViagemEncerrar').value;
  var resultado = document.getElementById('resultadoEntrega').value;

  if (!resultado) {
    alert('Selecione o resultado da entrega!');
    return;
  }

  var body = { status: resultado };
  
  if (resultado === 'retorno_problema') {
    var motivo = document.getElementById('motivoProblema').value;
    var obs = document.getElementById('obsProblema').value;
    
    if (!motivo) {
      alert('Selecione um motivo para o problema!');
      return;
    }
    
    body.motivo_retorno = motivo;
    body.observacoes_retorno = obs;
  }

  fetch('/api/viagens/' + id, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify(body)
  })
  .then(r => r.json())
  .then(function(data) {
    if (data.erro) {
      alert(data.erro);
      return;
    }
    fecharModal('modalEncerrarViagem');
    var msg = resultado === 'entregue' ? '✅ Viagem entregue com sucesso!' : '❌ Viagem retornou com problema!';
    mostrarNotificacao(msg);
    carregarViagens();
  });
}

// ========================================
// FILTROS E BUSCA
// ========================================
function buscarViagens() {
  var termo = document.getElementById('filtroViagemBusca').value;
  if (!termo) {
    carregarViagens();
    return;
  }

  fetch('/api/viagens/buscar/' + encodeURIComponent(termo), {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(r => r.json())
  .then(function(viagens) {
    var tbody = document.getElementById('tabelaViagens');
    tbody.innerHTML = '';

    if (!viagens || viagens.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">Nenhuma viagem encontrada</td></tr>';
      return;
    }

    viagens.forEach(function(v) {
      var statusBg = '';
      if (v.status === 'carregado') statusBg = 'background: rgba(245, 158, 11, 0.2); color: #fbbf24;';
      if (v.status === 'em_rota') statusBg = 'background: rgba(37, 99, 235, 0.2); color: #60a5fa;';
      if (v.status === 'entregue') statusBg = 'background: rgba(16, 185, 129, 0.2); color: #10b981;';
      if (v.status === 'retorno_problema') statusBg = 'background: rgba(239, 68, 68, 0.2); color: #ef4444;';

      tbody.innerHTML += '<tr style="border-top: 1px solid rgba(37, 99, 235, 0.1);"><td style="padding: 1.25rem;">' + v.id + '</td><td style="padding: 1.25rem;">' + v.placa + '</td><td style="padding: 1.25rem;">' + v.motorista + '</td><td style="padding: 1.25rem;">' + v.rota + '</td><td style="padding: 1.25rem;"><span class="status-badge" style="' + statusBg + '">' + v.status.replace(/_/g, ' ').toUpperCase() + '</span></td><td style="padding: 1.25rem;">' + (v.data_saida ? v.data_saida.substring(0, 10) : '-') + '</td><td style="padding: 1.25rem;"></td></tr>';
    });
  });
}

function buscarPorData() {
  var dataInicio = document.getElementById('dataInicioFiltro').value;
  var dataFim = document.getElementById('dataFimFiltro').value;
  
  if (!dataInicio || !dataFim) return;

  fetch('/api/viagens/data/' + dataInicio + '/' + dataFim, {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(r => r.json())
  .then(function(viagens) {
    var tbody = document.getElementById('tabelaViagens');
    tbody.innerHTML = '';

    if (!viagens || viagens.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">Nenhuma viagem no período</td></tr>';
      return;
    }

    viagens.forEach(function(v) {
      var statusBg = '';
      if (v.status === 'carregado') statusBg = 'background: rgba(245, 158, 11, 0.2); color: #fbbf24;';
      if (v.status === 'em_rota') statusBg = 'background: rgba(37, 99, 235, 0.2); color: #60a5fa;';
      if (v.status === 'entregue') statusBg = 'background: rgba(16, 185, 129, 0.2); color: #10b981;';
      if (v.status === 'retorno_problema') statusBg = 'background: rgba(239, 68, 68, 0.2); color: #ef4444;';

      tbody.innerHTML += '<tr style="border-top: 1px solid rgba(37, 99, 235, 0.1);"><td style="padding: 1.25rem;">' + v.id + '</td><td style="padding: 1.25rem;">' + v.placa + '</td><td style="padding: 1.25rem;">' + v.motorista + '</td><td style="padding: 1.25rem;">' + v.rota + '</td><td style="padding: 1.25rem;"><span class="status-badge" style="' + statusBg + '">' + v.status.replace(/_/g, ' ').toUpperCase() + '</span></td><td style="padding: 1.25rem;">' + (v.data_saida ? v.data_saida.substring(0, 10) : '-') + '</td><td style="padding: 1.25rem;"></td></tr>';
    });
  });
}

function limparFiltros() {
  document.getElementById('filtroViagemBusca').value = '';
  document.getElementById('dataInicioFiltro').value = '';
  document.getElementById('dataFimFiltro').value = '';
  document.getElementById('filtroStatusFiltro').value = '';
  carregarViagens();
}

function fecharModal(id) {
  document.getElementById(id).classList.remove('ativo');
}

carregarViagens();
  </script>
