<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo - Controle de Caminhões</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a202c 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e2e8f0;
    }

    .container {
      text-align: center;
      padding: 3rem;
      max-width: 540px;
      width: 100%;
    }

    .logo { font-size: 56px; margin-bottom: 1rem; opacity: 0.9; }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #e2e8f0;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .role-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 1rem 0 2rem;
    }
    .badge-admin    { background: rgba(99,102,241,0.2); color: #818cf8; border: 1px solid rgba(99,102,241,0.4); }
    .badge-operador { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid rgba(16,185,129,0.4); }
    .badge-motorista{ background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid rgba(245,158,11,0.4); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 2.5rem;
    }

    .card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 14px;
      padding: 1.5rem 1rem;
    }
    .card .icon { font-size: 28px; margin-bottom: 8px; }
    .card h3 { font-size: 13px; font-weight: 700; color: #93c5fd; text-transform: uppercase; margin-bottom: 4px; }
    .card p  { font-size: 11px; color: #64748b; }

    .progress-bar-wrap {
      background: rgba(30, 41, 59, 0.6);
      border-radius: 8px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 8px;
      animation: fill 3s linear forwards;
    }
    @keyframes fill { from { width: 0%; } to { width: 100%; } }

    .redirect-msg {
      font-size: 14px;
      color: #64748b;
    }

    @media (max-width: 480px) {
      .container { padding: 2rem 1.5rem; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🚛</div>
    <h1 id="saudacao">Bem-vindo!</h1>
    <div id="roleBadge" class="role-badge"></div>

    <div class="cards">
      <div class="card">
        <div class="icon">🔐</div>
        <h3>Admin</h3>
        <p>Gestão completa do sistema</p>
      </div>
      <div class="card">
        <div class="icon">📦</div>
        <h3>Operador</h3>
        <p>Carregamentos e rotas</p>
      </div>
      <div class="card">
        <div class="icon">🚚</div>
        <h3>Motorista</h3>
        <p>Suas entregas do dia</p>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar"></div>
    </div>
    <p class="redirect-msg">Redirecionando para seu painel...</p>
  </div>

  <script>
  const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
  const token   = localStorage.getItem('token');

  if (!token) {
    window.location.href = '/login.html';
  }

  const nome  = usuario.nome  || 'Usuário';
  const role  = usuario.role  || 'user';

  document.getElementById('saudacao').textContent = 'Olá, ' + nome + '!';

  const badge = document.getElementById('roleBadge');
  const labels = { admin: 'Administrador', operador: 'Operador', motorista: 'Motorista' };
  badge.textContent = labels[role] || role;
  badge.className = 'role-badge badge-' + (labels[role] ? role : 'operador');

  const destinos = {
    admin:    '/admin/admin-dashboard.html',
    operador: '/operador/operador-dashboard.html',
    motorista:'/motorista/motorista-entrega.html'
  };

  setTimeout(function() {
    window.location.href = destinos[role] || '/admin/admin-dashboard.html';
  }, 3000);
  </script>
</body>
</html>
