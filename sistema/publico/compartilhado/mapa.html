<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa GPS - Controle de Caminhões</title>
  <link rel="stylesheet" href="/style_ultra_profissional.css">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    /* ---- Layout ---- */
    main { padding: 0 !important; display: flex; flex-direction: column; height: calc(100vh - 64px); }

    .mapa-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: linear-gradient(135deg, #141a2f 0%, #1e2847 100%);
      border-bottom: 1px solid rgba(37,99,235,0.15);
      padding: 10px 20px;
      flex-shrink: 0;
    }

    .ws-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: auto;
    }
    .ws-on  { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .ws-off { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3);  }

    .btn-toolbar {
      padding: 8px 16px;
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 8px;
      background: rgba(37,99,235,0.1);
      color: #93c5fd;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
    }
    .btn-toolbar:hover { background: rgba(37,99,235,0.2); }
    .btn-toolbar.ativo { background: linear-gradient(135deg,#2563eb,#3b82f6); color: #0a0f1f; border-color: transparent; }

    .filtro-select {
      background: rgba(10,15,31,0.6);
      border: 1.5px solid rgba(37,99,235,0.2);
      color: #e0e7ff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
    }

    /* ---- Mapa ---- */
    #mapa {
      flex: 1;
      z-index: 1;
    }

    /* Sobrescrever estilo do Leaflet para tema escuro */
    .leaflet-container { background: #0a0f1f; }
    .leaflet-tile-pane { filter: brightness(0.85) saturate(0.9); }

    /* ---- Painel lateral ---- */
    .painel-lateral {
      position: absolute;
      top: 130px;
      right: 16px;
      width: 280px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .veiculo-card {
      background: rgba(10,15,31,0.92);
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 12px;
      padding: 12px 14px;
      pointer-events: all;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .veiculo-card:hover { border-color: rgba(37,99,235,0.6); }
    .veiculo-card.selecionado { border-color: #3b82f6; background: rgba(37,99,235,0.12); }

    .vcard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .vcard-placa { font-size: 15px; font-weight: 800; color: #60a5fa; }
    .vcard-status {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 12px;
    }
    .vs-online  { background: rgba(16,185,129,0.2); color: #10b981; }
    .vs-offline { background: rgba(100,116,139,0.2); color: #64748b; }

    .vcard-motorista { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    .vcard-coords    { font-size: 11px; color: #475569; font-family: monospace; }
    .vcard-vel       { font-size: 12px; color: #f59e0b; font-weight: 700; margin-top: 4px; }

    /* ---- Popup customizado ---- */
    .leaflet-popup-content-wrapper {
      background: rgba(10,15,31,0.97) !important;
      border: 1px solid rgba(37,99,235,0.4) !important;
      border-radius: 12px !important;
      color: #e0e7ff !important;
    }
    .leaflet-popup-tip { background: rgba(10,15,31,0.97) !important; }
    .popup-placa { font-size: 16px; font-weight: 800; color: #60a5fa; margin-bottom: 6px; }
    .popup-linha { font-size: 13px; color: #94a3b8; margin: 3px 0; }
    .popup-linha strong { color: #e0e7ff; }
    .btn-popup-rota {
      margin-top: 10px;
      padding: 8px 14px;
      background: linear-gradient(135deg,#2563eb,#3b82f6);
      color: #0a0f1f;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      text-transform: uppercase;
    }

    /* ---- Sem dados ---- */
    #semDados {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #475569;
      z-index: 400;
      pointer-events: none;
    }
    #semDados.oculto { display: none; }
    #semDados .icone { font-size: 48px; margin-bottom: 12px; }
    #semDados p { font-size: 15px; }
  </style>
</head>
<body>

  <canvas id="background-canvas" style="display:none;"></canvas>

  <nav></nav>

  <main>
    <!-- Toolbar -->
    <div class="mapa-toolbar">
      <button class="btn-toolbar ativo" id="btnTodos" onclick="filtrarVeiculos('todos')">🚛 Todos</button>
      <button class="btn-toolbar" id="btnEmRota" onclick="filtrarVeiculos('em_rota')">Em Rota</button>
      <button class="btn-toolbar" id="btnRoutes" onclick="toggleRotas()">📍 Rotas</button>
      <button class="btn-toolbar" onclick="centralizarTodos()">⊕ Centralizar</button>

      <select id="selCaminhaoFiltro" class="filtro-select" onchange="focarCaminhao(this.value)">
        <option value="">— Ir para caminhão —</option>
      </select>

      <span id="wsBadge" class="ws-badge ws-off">● Desconectado</span>
    </div>

    <!-- Mapa Leaflet -->
    <div id="mapa"></div>

    <!-- Painel lateral -->
    <div class="painel-lateral" id="painelVeiculos"></div>

    <!-- Mensagem sem dados -->
    <div id="semDados">
      <div class="icone">🗺️</div>
      <p>Nenhum caminhão com localização ativa</p>
      <p style="font-size:13px;margin-top:6px;color:#374151;">Os caminhões aparecerão aqui quando os entregadores iniciarem as entregas.</p>
    </div>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="/scripts/config-navbar.js"></script>
  <script src="/scripts/navbar.js"></script>
  <script>
  renderizarNavbar();
  const token   = localStorage.getItem('token');
  const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
  if (!token) { window.location.href = '/login.html'; }

  // ============================================================
  // MAPA LEAFLET
  // ============================================================
  const mapa = L.map('mapa', { zoomControl: true }).setView([-15.7942, -47.8825], 5); // centro BR

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(mapa);

  // ============================================================
  // STATE
  // ============================================================
  const marcadores = {};   // caminhao_id → L.Marker
  const rotasLayer = {};   // caminhao_id → L.Polyline
  const dadosVeiculos = {}; // caminhao_id → { placa, motorista, lat, lng, vel, ts }
  let mostrarRotas = false;
  let filtroAtivo = 'todos';
  let ws = null;

  // Ícone customizado do caminhão
  function iconeCaminhao(online = true, velocidade = null) {
    const cor = online ? '#10b981' : '#475569';
    const emoji = velocidade && velocidade > 0 ? '🚛' : '🅿️';
    return L.divIcon({
      className: '',
      html: `
        <div style="
          background:rgba(10,15,31,0.92);
          border:2px solid ${cor};
          border-radius:50%;
          width:40px;height:40px;
          display:flex;align-items:center;justify-content:center;
          font-size:18px;
          box-shadow:0 0 0 4px ${cor}33;
        ">${emoji}</div>`,
      iconSize: [40, 40],
      iconAnchor: [20, 20],
      popupAnchor: [0, -22]
    });
  }

  // ============================================================
  // WEBSOCKET
  // ============================================================
  function conectarWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}?token=${encodeURIComponent(token)}`);

    ws.onopen = () => {
      document.getElementById('wsBadge').textContent = '● Conectado';
      document.getElementById('wsBadge').className = 'ws-badge ws-on';
    };
    ws.onclose = () => {
      document.getElementById('wsBadge').textContent = '● Desconectado';
      document.getElementById('wsBadge').className = 'ws-badge ws-off';
      setTimeout(conectarWS, 4000);
    };
    ws.onerror = () => {};
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.tipo === 'NOTIFICACAO' && msg.evento === 'GPS_ATUALIZADO') {
          processarGPS(msg.dados);
        }
      } catch (_) {}
    };
  }

  // ============================================================
  // PROCESSAR POSIÇÃO GPS
  // ============================================================
  function processarGPS(d) {
    const { caminhao_id, placa, motorista, latitude, longitude, velocidade, timestamp } = d;
    if (!caminhao_id || latitude == null || longitude == null) return;

    const latlng = [parseFloat(latitude), parseFloat(longitude)];
    const ts = new Date(timestamp).toLocaleTimeString('pt-BR');
    const vel = velocidade ? `${velocidade} km/h` : 'parado';

    // Atualizar dados
    dadosVeiculos[caminhao_id] = {
      caminhao_id, placa: placa || `#${caminhao_id}`,
      motorista: motorista || '—',
      lat: latlng[0], lng: latlng[1],
      vel: velocidade, ts
    };

    // Criar ou mover marcador
    if (marcadores[caminhao_id]) {
      marcadores[caminhao_id]
        .setLatLng(latlng)
        .setIcon(iconeCaminhao(true, velocidade));
    } else {
      const m = L.marker(latlng, { icon: iconeCaminhao(true, velocidade) }).addTo(mapa);
      m.bindPopup(buildPopup(dadosVeiculos[caminhao_id]));
      m.on('click', () => m.openPopup());
      marcadores[caminhao_id] = m;
    }

    // Atualizar popup se aberto
    if (marcadores[caminhao_id].isPopupOpen()) {
      marcadores[caminhao_id].setPopupContent(buildPopup(dadosVeiculos[caminhao_id]));
    }

    // Extensão da rota
    if (mostrarRotas) {
      if (rotasLayer[caminhao_id]) {
        rotasLayer[caminhao_id].addLatLng(latlng);
      } else {
        rotasLayer[caminhao_id] = L.polyline([latlng], {
          color: '#3b82f6', weight: 3, opacity: 0.7, dashArray: '6,4'
        }).addTo(mapa);
      }
    }

    atualizarPainel();
    atualizarSelectFiltro();
    document.getElementById('semDados').classList.add('oculto');
  }

  function buildPopup(v) {
    return `
      <div class="popup-placa">🚛 ${v.placa}</div>
      <div class="popup-linha">👤 <strong>${v.motorista}</strong></div>
      <div class="popup-linha">📍 ${v.lat.toFixed(5)}, ${v.lng.toFixed(5)}</div>
      <div class="popup-linha">🕐 ${v.ts}</div>
      <div class="popup-linha">⚡ ${v.vel ? v.vel + ' km/h' : 'Parado'}</div>
      <button class="btn-popup-rota" onclick="carregarRotaDia(${v.caminhao_id})">Ver Rota do Dia</button>
    `;
  }

  // ============================================================
  // PAINEL LATERAL
  // ============================================================
  function atualizarPainel() {
    const painel = document.getElementById('painelVeiculos');
    painel.innerHTML = Object.values(dadosVeiculos).map(v => `
      <div class="veiculo-card" onclick="focarCaminhao(${v.caminhao_id})">
        <div class="vcard-header">
          <div class="vcard-placa">${v.placa}</div>
          <span class="vcard-status vs-online">● Online</span>
        </div>
        <div class="vcard-motorista">👤 ${v.motorista}</div>
        <div class="vcard-coords">${v.lat.toFixed(4)}, ${v.lng.toFixed(4)}</div>
        ${v.vel ? `<div class="vcard-vel">⚡ ${v.vel} km/h</div>` : ''}
      </div>
    `).join('') || '';
  }

  function atualizarSelectFiltro() {
    const sel = document.getElementById('selCaminhaoFiltro');
    const valor = sel.value;
    sel.innerHTML = '<option value="">— Ir para caminhão —</option>';
    Object.values(dadosVeiculos).forEach(v => {
      sel.innerHTML += `<option value="${v.caminhao_id}">${v.placa} — ${v.motorista}</option>`;
    });
    sel.value = valor;
  }

  // ============================================================
  // CONTROLES
  // ============================================================
  function focarCaminhao(id) {
    if (!id) return;
    const v = dadosVeiculos[id];
    if (v) mapa.setView([v.lat, v.lng], 15, { animate: true });
    if (marcadores[id]) marcadores[id].openPopup();
  }

  function centralizarTodos() {
    const pontos = Object.values(dadosVeiculos).map(v => [v.lat, v.lng]);
    if (pontos.length === 0) return;
    if (pontos.length === 1) { mapa.setView(pontos[0], 14); return; }
    mapa.fitBounds(L.latLngBounds(pontos), { padding: [60, 60] });
  }

  function toggleRotas() {
    mostrarRotas = !mostrarRotas;
    const btn = document.getElementById('btnRoutes');
    btn.classList.toggle('ativo', mostrarRotas);
    if (!mostrarRotas) {
      Object.values(rotasLayer).forEach(l => mapa.removeLayer(l));
      Object.keys(rotasLayer).forEach(k => delete rotasLayer[k]);
    }
  }

  function filtrarVeiculos(filtro) {
    filtroAtivo = filtro;
    ['btnTodos','btnEmRota'].forEach(id => document.getElementById(id)?.classList.remove('ativo'));
    document.getElementById(filtro === 'todos' ? 'btnTodos' : 'btnEmRota')?.classList.add('ativo');
  }

  // ============================================================
  // CARREGAR ROTA DO DIA (histórico)
  // ============================================================
  async function carregarRotaDia(caminhao_id) {
    const hoje = new Date().toISOString().split('T')[0];
    const resp = await fetch(`/api/localizacoes/${caminhao_id}/rota?data=${hoje}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!resp.ok) { alert('Erro ao carregar rota'); return; }
    const data = await resp.json();
    const pontos = (data.dados || []).map(p => [parseFloat(p.latitude), parseFloat(p.longitude)]);

    if (pontos.length === 0) { alert('Nenhuma localização registrada hoje para este caminhão.'); return; }

    // Remover rota anterior se existir
    if (rotasLayer[caminhao_id]) mapa.removeLayer(rotasLayer[caminhao_id]);

    rotasLayer[caminhao_id] = L.polyline(pontos, {
      color: '#f59e0b', weight: 4, opacity: 0.8
    }).addTo(mapa);

    mapa.fitBounds(rotasLayer[caminhao_id].getBounds(), { padding: [40, 40] });
    mostrarRotas = true;
    document.getElementById('btnRoutes').classList.add('ativo');
  }

  // ============================================================
  // CARGA INICIAL — posições já existentes no banco
  // ============================================================
  async function carregarPosicoesIniciais() {
    const resp = await fetch('/api/localizacoes/ativas', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!resp.ok) return;
    const data = await resp.json();
    const lista = data.dados || [];

    if (lista.length === 0) return;

    lista.forEach(d => processarGPS({
      caminhao_id: d.caminhao_id,
      placa: d.placa,
      motorista: d.motorista_nome,
      latitude: d.latitude,
      longitude: d.longitude,
      velocidade: d.velocidade,
      timestamp: d.timestamp
    }));

    centralizarTodos();
  }

  // ============================================================
  // INIT
  // ============================================================
  conectarWS();
  carregarPosicoesIniciais();

  // Atualiza posições via REST a cada 60s como fallback (se WS cair)
  setInterval(carregarPosicoesIniciais, 60000);
  </script>
</body>
</html>
