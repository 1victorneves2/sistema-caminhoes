<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Controle de Caminhões</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a202c 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* Canvas Background */
    #background-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.05;
    }

    .container {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%);
      padding: 3rem;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(51, 65, 85, 0.5);
      backdrop-filter: blur(10px);
      animation: slideUp 0.6s ease-out;
    }

    .logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }

    h1 {
      text-align: center;
      color: #e2e8f0;
      margin-bottom: 1rem;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: rgba(226, 232, 240, 0.6);
      margin-bottom: 2rem;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #e2e8f0;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(51, 65, 85, 0.8);
      border-radius: 8px;
      font-size: 15px;
      background: rgba(15, 23, 42, 0.6);
      color: #e2e8f0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background: rgba(15, 23, 42, 0.8);
    }

    input::placeholder {
      color: rgba(226, 232, 240, 0.4);
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s, opacity 0.6s;
      opacity: 1;
      z-index: 0;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    button:active::before {
      width: 300px;
      height: 300px;
      opacity: 0;
    }

    button span {
      position: relative;
      z-index: 1;
    }

    .info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 16px;
      border-radius: 8px;
      margin-top: 2rem;
      font-size: 13px;
      color: #60a5fa;
      line-height: 1.6;
      border-left: 4px solid #3b82f6;
    }

    .info strong {
      display: block;
      margin-bottom: 8px;
      color: #e2e8f0;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .info p {
      margin-bottom: 4px;
    }

    .erro {
      color: #ef4444;
      text-align: center;
      margin-top: 15px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      display: none;
      font-size: 14px;
      animation: shake 0.4s ease-out;
    }

    .erro.ativo {
      display: block;
    }

    .link-dashboard {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: rgba(226, 232, 240, 0.6);
    }

    .link-dashboard a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .link-dashboard a:hover {
      color: #3b82f6;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem;
        margin: 1rem;
      }

      h1 {
        font-size: 24px;
      }

      .logo {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

  <canvas id="background-canvas"></canvas>

  <div class="container">
    <div class="logo">Controle de Caminhões</div>
    <h1>Login</h1>
    <p class="subtitle">Acesso Seguro</p>
    
    <form id="formLogin">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="Sua senha" required>
      </div>

      <button type="submit">
        <span>Entrar</span>
      </button>
    </form>

    <div class="erro" id="erro"></div>

    <div class="info">
      <strong>Credenciais de Demonstração</strong>
      <p>Email: admin@sistema.com</p>
      <p>Senha: admin123</p>
    </div>

    <div class="link-dashboard">
      Voltar ao <a href="index.html">Dashboard</a>
    </div>
  </div>

  <script>
// Canvas Background
function initCanvas() {
  const canvas = document.getElementById('background-canvas');
  const ctx = canvas.getContext('2d');
  
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  let particles = [];
  
  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.5;
      this.speedY = (Math.random() - 0.5) * 0.5;
      this.opacity = Math.random() * 0.5 + 0.2;
    }
    
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.x > canvas.width) this.x = 0;
      if (this.x < 0) this.x = canvas.width;
      if (this.y > canvas.height) this.y = 0;
      if (this.y < 0) this.y = canvas.height;
    }
    
    draw() {
      ctx.fillStyle = `rgba(59, 130, 246, ${this.opacity})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  for (let i = 0; i < 50; i++) {
    particles.push(new Particle());
  }
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animate);
  }
  
  animate();
  
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

initCanvas();

// Form Handler
document.getElementById('formLogin').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  const erroDiv = document.getElementById('erro');

  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });

    const data = await response.json();

    if (!response.ok) {
      erroDiv.textContent = data.erro || 'Erro ao fazer login';
      erroDiv.classList.add('ativo');
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('usuario', JSON.stringify(data.usuario));

    if (data.usuario.role === 'admin') {
      window.location.href = '/admin.html';
    } else {
      window.location.href = '/index.html';
    }
  } catch (err) {
    erroDiv.textContent = 'Erro ao conectar ao servidor';
    erroDiv.classList.add('ativo');
  }
});
  </script>
</body>
</html>
